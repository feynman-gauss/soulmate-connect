<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(346, 77%, 65%);stop-opacity:1" />
      <stop offset="50%" style="stop-color:hsl(20, 80%, 60%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(38, 92%, 60%);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="hsl(20, 14.3%, 4.1%)"/>
  <rect x="8" y="8" width="496" height="496" rx="90" ry="90" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.3"/>
  <text x="256" y="390" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="380" fill="url(#grad)" filter="url(#glow)">T</text>
</svg>
