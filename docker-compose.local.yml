version: '3.8'

# Local Docker Compose for Soulmate Connect (HTTP only, no SSL)
# Usage: docker-compose -f docker-compose.local.yml up -d --build

services:
  # Nginx Reverse Proxy (HTTP only)
  nginx:
    image: nginx:alpine
    container_name: soulmate_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - soulmate_network

  # MongoDB (Commented out as we are using Atlas)
  # mongodb:
  #   image: mongo:7.0
  #   container_name: soulmate_mongodb
  #   restart: always
  #   ports:
  #     - "127.0.0.1:27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: admin123
  #     MONGO_INITDB_DATABASE: soulmate_connect
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - soulmate_network

  # FastAPI Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: soulmate_api
    restart: always
    environment:
      - MONGODB_URL=mongodb+srv://test:li8y5AC07hp496Dy@soulmate.hvef7sa.mongodb.net/
      - DEBUG=True
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost,http://localhost:80
    volumes:
      - ./api/uploads:/app/uploads
      - ./api/logs:/app/logs
    # depends_on:
    #   - mongodb
    networks:
      - soulmate_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: soulmate_frontend
    restart: always
    networks:
      - soulmate_network

volumes:
  mongodb_data:


networks:
  soulmate_network:
    driver: bridge
