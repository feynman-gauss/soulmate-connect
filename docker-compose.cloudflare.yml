version: '3.8'

# Docker Compose for Cloudflare Tunnel Deployment
# Usage: docker-compose -f docker-compose.cloudflare.yml up -d --build

services:
  # Nginx Reverse Proxy (HTTP only, Cloudflare handles SSL)
  nginx:
    image: nginx:alpine
    container_name: soulmate_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.cloudflare.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
      # - mongodb
    networks:
      - soulmate_network

  # MongoDB (Commented out as we are using Atlas)
  # mongodb:
  #   image: mongo:7.0
  #   container_name: soulmate_mongodb
  #   restart: always
  #   ports:
  #     - "127.0.0.1:27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
  #     MONGO_INITDB_DATABASE: soulmate_connect
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - soulmate_network

  # FastAPI Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: soulmate_api
    restart: always
    environment:
      - MONGODB_URL=mongodb+srv://test:li8y5AC07hp496Dy@soulmate.hvef7sa.mongodb.net/
      - DEBUG=False
      - ENVIRONMENT=production
    volumes:
      - ./api/uploads:/app/uploads
      - ./api/logs:/app/logs
    # depends_on:
    #   - mongodb
    networks:
      - soulmate_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: soulmate_frontend
    restart: always
    environment:
      # Use relative path so it works with any Cloudflare URL
      - VITE_API_URL=/api/v1
    networks:
      - soulmate_network

volumes:
  mongodb_data:


networks:
  soulmate_network:
    driver: bridge
